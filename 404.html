<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page not found · angry sheep</title>
  <meta name="color-scheme" content="light">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,300..700,0..100,0..1;1,9..144,300..700,0..100,0..1&family=IBM+Plex+Mono:wght@400&display=swap">
  <!-- Self-contained: GitHub Pages serves this file for any missing URL, where
       relative asset paths would break — so the look is inlined here. -->
  <style>
    :root { --bone:#EDE7DA; --ink:#211D26; --oxblood:#7A2E2E; --verdigris:#4C7A6F; --ink-faint:#645F68; }
    * { box-sizing: border-box; margin: 0; }
    body {
      background: var(--bone); color: var(--ink); min-height: 100vh;
      display: grid; place-items: center; text-align: center;
      font-family: Inter, system-ui, sans-serif; padding: 2rem;
    }
    .wrap { max-width: 34ch; }
    .num {
      font-family: "Fraunces", Georgia, serif; font-weight: 500;
      font-variation-settings: "opsz" 60;
      font-size: clamp(3rem, 12vw, 5rem); line-height: 1; color: var(--ink); letter-spacing: -0.02em;
    }
    .num span { color: var(--oxblood); }
    h1 { font-family: "IBM Plex Mono", monospace; font-weight: 400;
         color: var(--ink-faint); font-size: .8rem; letter-spacing: .16em; text-transform: uppercase;
         margin: 1rem 0 1.8rem; }
    a.home {
      display: inline-block; font-family: "IBM Plex Mono", monospace; font-size: .72rem;
      letter-spacing: .14em; text-transform: uppercase; color: var(--oxblood);
      text-decoration: underline; text-underline-offset: .3em;
    }
    a.home:hover { color: var(--verdigris); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="num">4<span>0</span>4</div>
    <h1>page not found</h1>
    <a class="home" id="home" href="/">← index</a>
  </div>

  <script>
    // Point "home" at the site root, whether this is a GitHub project page
    // (user.github.io/<repo>/) or served from a domain root.
    (function () {
      var a = document.getElementById("home");
      var segs = location.pathname.split("/").filter(Boolean);
      if (/\.github\.io$/.test(location.hostname) && segs.length > 0) {
        a.href = "/" + segs[0] + "/";
      } else {
        a.href = "/";
      }
    })();
  </script>
</body>
</html>
