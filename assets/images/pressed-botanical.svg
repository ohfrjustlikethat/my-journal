<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 460" role="img"
     aria-label="A pressed flower specimen mounted on paper, with a hand-labelled herbarium card.">
  <rect width="640" height="460" fill="#EDE7DA"/>

  <!-- mounting corners -->
  <g fill="none" stroke="#7A2E2E" stroke-width="2" stroke-opacity="0.5">
    <path d="M60 70 l 34 0 M60 70 l 0 34"/>
    <path d="M420 70 l -34 0 M420 70 l 0 34"/>
    <path d="M60 300 l 34 0 M60 300 l 0 -34"/>
    <path d="M420 300 l -34 0 M420 300 l 0 -34"/>
  </g>

  <!-- stem -->
  <path d="M240 300 C 236 250 250 210 244 170 C 240 140 230 120 236 96"
        fill="none" stroke="#4C7A6F" stroke-width="3" stroke-linecap="round"/>

  <!-- leaves -->
  <g fill="#4C7A6F" fill-opacity="0.75" stroke="#37564E" stroke-width="1">
    <path d="M242 250 C 210 244 186 258 176 282 C 210 286 236 276 246 254 Z"/>
    <path d="M244 210 C 276 202 300 214 312 236 C 278 242 252 232 244 214 Z"/>
    <path d="M240 176 C 214 168 196 176 186 196 C 214 202 234 194 242 180 Z"/>
  </g>
  <g fill="none" stroke="#37564E" stroke-width="0.8" stroke-opacity="0.7">
    <path d="M242 250 C 222 254 202 264 184 278"/>
    <path d="M244 210 C 268 210 290 220 306 232"/>
  </g>

  <!-- blossom -->
  <g transform="translate(236 96)">
    <g fill="#7A2E2E" fill-opacity="0.82" stroke="#5C2020" stroke-width="1">
      <ellipse cx="0" cy="-22" rx="12" ry="22"/>
      <ellipse cx="0" cy="-22" rx="12" ry="22" transform="rotate(72)"/>
      <ellipse cx="0" cy="-22" rx="12" ry="22" transform="rotate(144)"/>
      <ellipse cx="0" cy="-22" rx="12" ry="22" transform="rotate(216)"/>
      <ellipse cx="0" cy="-22" rx="12" ry="22" transform="rotate(288)"/>
    </g>
    <circle r="9" fill="#B4863C"/>
  </g>

  <!-- herbarium label card -->
  <g transform="translate(430 250)">
    <rect width="168" height="120" fill="#F6F1E6" stroke="#D2C8B3" stroke-width="1.5"/>
    <line x1="14" y1="34" x2="154" y2="34" stroke="#D2C8B3"/>
    <text x="14" y="26" font-family="'IBM Plex Mono',monospace" font-size="11" letter-spacing="2"
          fill="#7A2E2E">HERBARIUM · No. 47</text>
    <text x="14" y="56" font-family="'Fraunces',Georgia,serif" font-style="italic" font-size="16"
          fill="#211D26">Commonplacea</text>
    <text x="14" y="76" font-family="'Fraunces',Georgia,serif" font-style="italic" font-size="16"
          fill="#211D26">vulgaris</text>
    <text x="14" y="102" font-family="'IBM Plex Mono',monospace" font-size="10"
          fill="#4C4750">coll. by hand · pressed at leisure</text>
  </g>
</svg>
